version: '3.8'

services:
  cursor-caliper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-caliper
    restart: unless-stopped
    ports:
      - "28001:28001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
